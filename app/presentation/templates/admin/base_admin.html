<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SafeUpload — Centro de Administração{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="admin-body">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <span class="sidebar-brand-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    <path d="m9 12 2 2 4-4"/>
                </svg>
            </span>
            <div class="sidebar-brand-text">
                <span class="sidebar-brand-name">SafeUpload</span>
                <span class="sidebar-brand-area">Administração</span>
            </div>
        </div>

        <nav class="sidebar-nav" aria-label="Navegação principal">
            <span class="sidebar-section">Operação</span>

            <a href="/admin/dashboard" class="nav-link {% if active_page == 'dashboard' %}is-active{% endif %}">
                <span class="nav-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/>
                        <rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/>
                    </svg>
                </span>
                <span>Painel</span>
            </a>

            <a href="/admin/auditoria" class="nav-link {% if active_page == 'audit' %}is-active{% endif %}">
                <span class="nav-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/>
                        <line x1="9" y1="17" x2="15" y2="17"/>
                    </svg>
                </span>
                <span>Auditoria</span>
            </a>

            <a href="/admin/relatorios" class="nav-link {% if active_page == 'reports' %}is-active{% endif %}">
                <span class="nav-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/>
                        <line x1="6" y1="20" x2="6" y2="16"/>
                    </svg>
                </span>
                <span>Relatórios</span>
            </a>

            <span class="sidebar-section">Configuração</span>

            <a href="#" class="nav-link {% if active_page == 'categories' %}is-active{% endif %}">
                <span class="nav-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </span>
                <span>Categorias de detecção</span>
            </a>

            <a href="#" class="nav-link {% if active_page == 'allowlist' %}is-active{% endif %}">
                <span class="nav-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
                        <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
                        <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
                    </svg>
                </span>
                <span>Lista de exceções</span>
            </a>

            <a href="#" class="nav-link {% if active_page == 'users' %}is-active{% endif %}">
                <span class="nav-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                </span>
                <span>Usuários</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="/admin/login" class="nav-link">
                <span class="nav-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                </span>
                <span>Sair</span>
            </a>
        </div>
    </aside>

    <div class="admin-main">
        <header class="topbar">
            <div class="topbar-left">
                <h1 class="topbar-title">{% block page_title %}{% endblock %}</h1>
            </div>
            <div class="topbar-right">
                <div class="server-status" title="Status do servidor central">
                    <span class="status-dot status-dot-online" aria-hidden="true"></span>
                    <span>Servidor central operacional</span>
                </div>
                <div class="user-chip">
                    <div class="user-avatar" aria-hidden="true">A</div>
                    <div class="user-info">
                        <div class="user-name">Administrador</div>
                        <div class="user-role">admin@safeupload.local</div>
                    </div>
                </div>
            </div>
        </header>

        <main class="admin-content">
            {% block content %}{% endblock %}
        </main>
    </div>
</
